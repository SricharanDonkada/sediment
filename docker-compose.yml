# Sediment — local development stack
#
# Datastores and queue for the Phase 1 pipeline:
#   - postgres : structured facts table + pgvector embeddings (the knowledge store)
#   - neo4j    : entity/relationship graph extracted from transcripts
#   - redis    : queue broker (plain Redis list) for the pipeline
#
# Application services: `ingestion` and `transcription` are defined below. The
# remaining services (extraction, knowledge-api, realtime, orchestrator, web)
# are not defined yet. Bring the stack up with `docker compose up -d`.

name: sediment

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: sediment-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sediment}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sediment}
      POSTGRES_DB: ${POSTGRES_DB:-sediment}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sediment} -d ${POSTGRES_DB:-sediment}"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: sediment-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-sediment-dev}
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"   # HTTP browser
      - "${NEO4J_BOLT_PORT:-7687}:7687"   # Bolt driver
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: sediment-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: sediment-minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-sediment}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-sediment-dev}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"     # S3 API
      - "${MINIO_CONSOLE_PORT:-9001}:9001" # web console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  ingestion:
    build:
      context: .
      dockerfile: services/ingestion/Dockerfile
    container_name: sediment-ingestion
    restart: unless-stopped
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-sediment}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-sediment-dev}
      MINIO_SECURE: "false"
      INGESTION_BUCKET: ${INGESTION_BUCKET:-audio}
      REDIS_URL: redis://redis:6379/0
      INGESTION_QUEUE: ${INGESTION_QUEUE:-audio-transcribe}
    ports:
      - "${INGESTION_PORT:-8000}:8000"
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  transcription:
    build:
      context: .
      dockerfile: services/transcription/Dockerfile
    container_name: sediment-transcription
    restart: unless-stopped
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-sediment}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-sediment-dev}
      MINIO_SECURE: "false"
      TRANSCRIPTS_BUCKET: ${TRANSCRIPTS_BUCKET:-transcripts}
      REDIS_URL: redis://redis:6379/0
      INGESTION_QUEUE: ${INGESTION_QUEUE:-audio-transcribe}
      TRANSCRIPTION_QUEUE: ${TRANSCRIPTION_QUEUE:-extract}
      WHISPER_MODEL: ${WHISPER_MODEL:-large-v3-turbo}
      WHISPER_DEVICE: ${WHISPER_DEVICE:-cpu}
      WHISPER_COMPUTE_TYPE: ${WHISPER_COMPUTE_TYPE:-int8}
      HF_TOKEN: ${HF_TOKEN:-}
      HF_HOME: /models
    volumes:
      - hf-cache:/models
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  extraction:
    build:
      context: .
      dockerfile: services/extraction/Dockerfile
    container_name: sediment-extraction
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-sediment}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-sediment-dev}
      MINIO_SECURE: "false"
      TRANSCRIPTS_BUCKET: ${TRANSCRIPTS_BUCKET:-transcripts}
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-sediment}:${POSTGRES_PASSWORD:-sediment}@postgres:5432/${POSTGRES_DB:-sediment}
      EXTRACTION_QUEUE: ${EXTRACTION_QUEUE:-extract}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_EXTRACTION_MODEL: ${GEMINI_EXTRACTION_MODEL:-gemini-2.5-flash}
      GEMINI_EMBEDDING_MODEL: ${GEMINI_EMBEDDING_MODEL:-gemini-embedding-001}
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy

  knowledge-api:
    build:
      context: .
      dockerfile: services/knowledge-api/Dockerfile
    container_name: sediment-knowledge-api
    restart: unless-stopped
    environment:
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-sediment}:${POSTGRES_PASSWORD:-sediment}@postgres:5432/${POSTGRES_DB:-sediment}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_EMBEDDING_MODEL: ${GEMINI_EMBEDDING_MODEL:-gemini-embedding-001}
      GEMINI_SYNTHESIS_MODEL: ${GEMINI_SYNTHESIS_MODEL:-gemini-2.5-flash}
    ports:
      - "${KNOWLEDGE_API_PORT:-8001}:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
  neo4j-data:
  neo4j-logs:
  redis-data:
  minio-data:
  hf-cache:
